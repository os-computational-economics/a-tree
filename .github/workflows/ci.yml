name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      # TODO: re-enable lint once eslint.config.mjs is fixed.
      # The current config mixes flat config with legacy compat shims that
      # are incompatible with newer plugins (notably @next/eslint-plugin-next).
      # - name: Lint
      #   run: npx eslint .

      - name: Build
        env:
          # Dummy env vars so the build can complete in CI.
          # These are not used at build time; they only need to be defined.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          JWT_ACCESS_SECRET: ci-dummy-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          AWS_ACCESS_KEY_ID: ci
          AWS_SECRET_ACCESS_KEY: ci
          AWS_REGION: us-east-2
          AWS_S3_BUCKET_NAME: ci
          LLM_API_KEY: ci
          SMTP_HOST: smtp.example.com
          SMTP_PORT: "587"
          SMTP_USER: ci@example.com
          SMTP_PASS: ci
          MAINTENANCE_MODE: "false"
        run: npm run build
